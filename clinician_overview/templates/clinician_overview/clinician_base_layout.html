{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <title>{% block title %}{% endblock %}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Karla:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rubik+Mono+One&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{% static 'clinician_overview/clinician_base_styles.css'%}"
    />
    {% block head %}{%endblock%}
  </head>
  <body>
    <main>
      <img id="step-logo" src="{% static 'clinician_overview/STEP Logo_White.png' %}">
      <div class="content-columns">
        <nav>
          <ul>
            <li class="{% if nav_section == 'notifications' %}active{% endif %}"><a href="{% url 'notifications' %}">Notifications</a></li>
            <li class="{% if nav_section == 'clients' %}active{% endif %}"><a href="{% url 'clients' %}">Clients</a></li>
            <li class="{% if nav_section == 'measures' %}active{% endif %}"><a>Measures</a></li>
            <li class="{% if nav_section == 'step-together' %}active{% endif %}"><a>STEP Together</a></li>
            <li class="{% if nav_section == 'step-solo' %}active{% endif %}"><a>STEP Solo Access</a></li>
            <li class="{% if nav_section == 'step-resources' %}active{% endif %}"><a>STEP Resources</a></li>
            <li class="{% if nav_section == 'flash-tep' %}active{% endif %}"><a>Flash-TEP</a></li>
            <li class="{% if nav_section == 'help' %}active{% endif %}"><a>Help</a></li>
          </ul>
        </nav>
        <div style="margin-left: 1rem; width: 100%">
          {% block content %}
          <p>placeholder</p>
          {% endblock %}
        </div>
      </div>
    </main>
    <footer>
      <h4>
        <a href="https://www.prepped4learning.com">Prepped 4 Learning</a>
      </h4>
    </footer>
  </body>
</html>
