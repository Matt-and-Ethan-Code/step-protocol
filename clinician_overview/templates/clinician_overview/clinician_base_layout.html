{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <title>{% block title %}{% endblock %}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Karla:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rubik+Mono+One&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{% static 'clinician_overview/clinician_base_styles.css'%}"
    />
    {% block head %}{%endblock%}
  </head>
  <body>
    <main>
      <a href="/clinician/">
        <img id="step-logo" src="{% static 'clinician_overview/STEP Logo_White.png' %}">
      </a>
      <div class="content-columns">
        <nav>
          <ul>
            <li class="{% if nav_section == 'notifications' %}active{% endif %}"><a href="{% url 'notifications' %}">Notifications</a></li>
            <li class="{% if nav_section == 'clients' %}active{% endif %}"><a href="{% url 'clients' %}">Clients</a></li>
            <li class="{% if nav_section == 'measures' %}active{% endif %}"><a>Measures</a></li>
            <li class="{% if nav_section == 'step-together' %}active{% endif %}"><a>STEP Together</a></li>
            <li class="{% if nav_section == 'step-solo' %}active{% endif %}"><a>STEP Solo Access</a></li>
            <li class="{% if nav_section == 'step-resources' %}active{% endif %}"><a>STEP Resources</a></li>
            <li class="{% if nav_section == 'flash-tep' %}active{% endif %}"><a>Flash-TEP</a></li>
            <li class="{% if nav_section == 'help' %}active{% endif %}"><a>Help</a></li>
          </ul>
        </nav>
        <div id="main">
          {% block content %}
          <p>placeholder</p>
          {% endblock %}
        </div>
      </div>
    </main>
    <footer>
      <h4>
        <a href="https://www.prepped4learning.com">Prepped 4 Learning</a>
      </h4>
    </footer>
    <script>
      /**
       * Fires whenever the "X selected" value needs to update.
       * Wiil fire when:
       *  - rows are selected / deselected
       *  - rows are deleted
       * 
       * Since the selected count also determines whether Delete is visible (and the counter), 
       * their visibility also gets adjusted flexibly.
       * 
       * newSelectedCount: integer, the updated count of selected rows (should be zero or two)
      */
      const updateSelectedCounter = (newSelectedCount) => {
          const selectedCounter = document.getElementById("selected-counter");
          if (selectedCounter) {
              selectedCounter.textContent = newSelectedCount;
          }

          const hiddenControls = Array.from(document.querySelectorAll('.hide-when-no-rows-selected'));
          if (newSelectedCount === 0) {
              for (const control of hiddenControls) {
                  control.style.display = 'none';
              }
          } else {
              for (const control of hiddenControls) {
                  control.style.display = "flex";
              }
          }
      }


      
      const handleRowSelect = () => {
          const checkboxes = document.querySelectorAll("#selectable-table input[type='checkbox']:checked")
          updateSelectedCounter(checkboxes.length);
      }

      

      // listener to delete a submission (row of data) (or several) from the client
      const deleteListener = async (buildEndpointFunction) => {
          // parse the client identifier from the URL
          const urlSections = window.location.pathname.split('/');
          // the client identifier will be the last section of the url path -- extract it
          const clientIdentifier = urlSections[urlSections.length - 1];

          const selectedRows = Array.from(document.querySelectorAll('#selectable-table .etable-row:has(input:checked)'));
          const selectedIds = []
          for (const row of selectedRows) {
              const thisRowID = row.dataset.id;
              selectedIds.push(Number.parseInt(thisRowID));
          }

          const endpoint = buildEndpointFunction(clientIdentifier);

          const response = await fetch(endpoint, {
              method: "POST",
              credentials: "same-origin",
              headers: {
                  "Content-Type": "application/json",
                  "X-CSRFToken": "{{ csrf_token }}",  // Django requires this for POST
              },
              body: JSON.stringify({ rows: selectedIds })
          });

          const result = await response.json();
          //  if the deletion was successful, hide the rows
          if (result.success) {
              // hide each row
              for (const row of selectedRows) {
                  row.remove();
              }

              // update the selected count
              // set the new coount of updated rows to 0
              updateSelectedCounter(0);
          }

      }


      
    </script>
  </body>
</html>
